name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck hooks
        run: |
          shellcheck -S warning \
            dispatch.sh \
            preuse_hook.sh \
            stop_hook.sh \
            install.sh \
            uninstall.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Run tests
        run: |
          python3 -m pytest \
            test_classifier.py \
            test_evaluator.py \
            test_interceptor.py \
            test_category_mapper.py \
            test_llm_client.py \
            test_stack_scanner.py \
            test_boundaries.py \
            -v --tb=short
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
